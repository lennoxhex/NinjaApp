name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good
          pip3 install --user --upgrade buildozer cython virtualenv

      - name: Fabricar APK
        run: |
          export PATH=$PATH:~/.local/bin
          # El comando 'yes' acepta todas las licencias de Android automáticamente
          yes | buildozer android debug

      - name: Subir APK Final
        uses: actions/upload-artifact@v4
        with:
          name: Mi_App_Ninja
          path: bin/*.apk
          
